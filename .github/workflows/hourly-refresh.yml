name: Daily Data Refresh

on:
  schedule:
    # GitHub Actions cron uses UTC. 06:00 UTC = 00:00 America/Mexico_City (UTC-6).
    - cron: "0 6 * * *"
  workflow_dispatch:

concurrency:
  group: daily-refresh
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 55

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: |
          python -m playwright install --with-deps chromium

      - name: Run daily refresh pipeline
        env:
          PYTHONIOENCODING: utf-8
          PYTHONUTF8: '1'
          PYTHONUNBUFFERED: '1'
          FLASHSCORE_ENABLED: ${{ secrets.FLASHSCORE_ENABLED || '1' }}
          THEODDSAPI_KEY: ${{ secrets.THEODDSAPI_KEY }}
          THEODDSAPI_DAYS_AHEAD: ${{ secrets.THEODDSAPI_DAYS_AHEAD || '2' }}
        run: |
          python src/run_hourly_refresh.py

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data src/reports src/models
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "chore: daily data refresh"
            git push
          fi

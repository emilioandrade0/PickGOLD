databases:
  - name: pickgold-auth-db
    databaseName: pickgold_auth
    user: pickgold_auth_user
    plan: free

services:
  - type: web
    name: pickgold-api
    runtime: python
    plan: free
    rootDir: .
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.api:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: FLASHSCORE_ENABLED
        value: "1"
      - key: THEODDSAPI_DAYS_AHEAD
        value: "2"
      - key: FRONTEND_ORIGIN
        sync: false
      - key: THEODDSAPI_KEY
        sync: false
      - key: AUTH_DATABASE_URL
        fromDatabase:
          name: pickgold-auth-db
          property: connectionString
